name: Claude PR Review

on:
  pull_request:
    types: [opened]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  review:
    # PR opened時は自動実行、コメント/レビュー時は@claude含む場合のみ
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    strategy:
      matrix:
        review:
          - name: security
            emoji: "\U0001F512"
            prompt: |
              セキュリティ観点でPRの変更をレビューしてください。
              チェック項目：
              - 認証情報・シークレットの露出
              - 危険なコマンド（rm -rf、chmod 777等）
              - 安全でないパーミッション設定
              - 信頼できないソースからの実行

              問題があれば簡潔に指摘（各3行以内）。問題なければ「OK」のみ。
          - name: shell-quality
            emoji: "\U0001F41A"
            prompt: |
              シェルスクリプト品質の観点でPRの変更をレビューしてください。
              チェック項目：
              - エラーハンドリング（set -e, 戻り値チェック）
              - 変数のクォート漏れ
              - 移植性の問題（bash固有機能の不適切な使用）
              - コマンド存在確認

              問題があれば簡潔に指摘（各3行以内）。問題なければ「OK」のみ。
          - name: config-consistency
            emoji: "\U0001F9E9"
            prompt: |
              設定ファイルの整合性・互換性の観点でPRの変更をレビューしてください。
              チェック項目：
              - パスの整合性（存在しないパスへの参照）
              - 依存関係の矛盾
              - 環境間の互換性（Ubuntu/WSL2）
              - chezmoi テンプレート構文

              問題があれば簡潔に指摘（各3行以内）。問題なければ「OK」のみ。
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: "Run Claude Review: ${{ matrix.review.emoji }} ${{ matrix.review.name }}"
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: "claude-haiku-4-5"
          direct_prompt: |
            ${{ matrix.review.emoji }} **${{ matrix.review.name }} review**

            ${{ matrix.review.prompt }}
