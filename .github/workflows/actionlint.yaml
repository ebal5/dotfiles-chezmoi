---
name: actionlint

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/labeler.yml"

jobs:
  actionlint:
    name: Lint GitHub Actions workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          reporter: github-pr-review
