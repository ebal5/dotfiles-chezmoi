---
name: PR Labeler

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  label:
    name: Auto label PR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@v6
        with:
          configuration-path: .github/labeler.yml
