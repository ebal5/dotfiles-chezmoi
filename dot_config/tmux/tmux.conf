# =============================================================================
# TMUX Configuration
# =============================================================================
#
# 基本操作:
#   C-t          - プレフィックスキー（C-b から変更、Claude Code との競合回避）
#   C-t d        - セッションをデタッチ
#   C-t c        - 新しいウィンドウを作成
#   C-t n/p      - 次/前のウィンドウ
#   C-t ,        - ウィンドウ名を変更
#   C-t r        - 設定をリロード
#   C-t ?        - キーバインド一覧
#   C-t [        - コピーモードに入る
#   C-t Tab      - 直前のウィンドウにトグル
#   C-t a        - 直前のセッションにトグル
#   C-t /        - ペイン内テキスト検索
#
# ペイン操作:
#   v / |        - 縦分割
#   s / -        - 横分割
#   h,j,k,l      - ペイン間移動（プレフィックス付き）
#   M-h,j,k,l    - ペイン間移動（プレフィックスなし）
#   H,J,K,L      - リサイズ（10px）
#   C-h,j,k,l    - リサイズ（1px）
#   M-m          - ペイン最大化/復元
#   y            - ペイン同期切替
#   @            - 別ウィンドウのペインを結合
#   f            - セッション/ウィンドウ選択ツリー
#
# Claude Code:
#   C            - worktreeモードで起動（ランダム名）
#   M-c          - worktreeモードで起動（名前入力）
#
# セッション管理:
#   S            - 新規セッション
#   X            - セッション終了
#
# ウィンドウ名管理（スクリプト連携）:
#   M-s          - スマート命名
#   M-g          - Git情報付き命名
#   M-t          - 時刻命名
#   M-p          - プロジェクト名命名
#   M-r          - カスタム名入力
#   M-w          - 現在名表示
#   M-0          - 名前リセット
#
# コピーモード (vi):
#   v            - 選択開始
#   y            - コピー
#   C-v          - 矩形選択
#
# =============================================================================

# ---------------------------------------------------------------------------
# 基本設定
# ---------------------------------------------------------------------------

# プレフィックスキー: C-t（Claude Code の C-b との競合を回避）
unbind C-b
set -g prefix C-t
bind C-t send-prefix

set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g status-keys vi
set -g history-limit 10000
set -sg escape-time 0
set -g focus-events on
set -g mouse on

setw -g mode-keys vi
setw -g monitor-activity on

# ウィンドウ/ペインのインデックスを1から開始
set -g base-index 1
setw -g pane-base-index 1

# ウィンドウ名の制御
set -g allow-rename on
setw -g automatic-rename off

# パフォーマンス
set -g aggressive-resize on

# ---------------------------------------------------------------------------
# プラグイン (TPM)
# ---------------------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'catppuccin/tmux#v2.1.3'

# tmux-resurrect 設定
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-save-bash-history 'on'

# ---------------------------------------------------------------------------
# Catppuccin テーマ設定
# ---------------------------------------------------------------------------

set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'

# ステータスバー
set -g status-right-length 150
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session}"
set -agF status-right "#{E:@catppuccin_status_host}"
set -agF status-right "#[fg=#{@thm_green},bg=default] ##(~/.scripts/tmux_git_status.sh '##{pane_current_path}')#[default]"
set -agF status-right "#{E:@catppuccin_status_date_time}"

# 日時フォーマット
set -g @catppuccin_date_time_text "%m/%d %H:%M"

# ---------------------------------------------------------------------------
# キーバインド
# ---------------------------------------------------------------------------

# 設定リロード
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# 直前のウィンドウ/セッションにトグル
bind Tab last-window
bind a switch-client -l

# ペイン内テキスト検索（コピーモードに入って検索開始）
bind / copy-mode \; send-keys ?

# ペイン分割（カレントディレクトリを引き継ぐ）
bind v split-window -h -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ペイン移動（プレフィックス付き vim風）
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ペイン移動（プレフィックスなし Alt+vim）
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ペインリサイズ（大: 10px）
bind -r H resize-pane -L 10
bind -r J resize-pane -D 10
bind -r K resize-pane -U 10
bind -r L resize-pane -R 10

# ペインリサイズ（小: 1px）
bind -r C-h resize-pane -L 1
bind -r C-j resize-pane -D 1
bind -r C-k resize-pane -U 1
bind -r C-l resize-pane -R 1

# ウィンドウ移動
bind -n S-Left previous-window
bind -n S-Right next-window
bind -r C-Left select-window -t :-
bind -r C-Right select-window -t :+

# ウィンドウ入れ替え
bind -n C-S-Left swap-window -t -1\; previous-window
bind -n C-S-Right swap-window -t +1\; next-window

# ペイン最大化/復元
bind -n M-m resize-pane -Z

# ペイン同期
bind y set-window-option synchronize-panes\; display-message "synchronize-panes is now #{?pane_synchronized,on,off}"

# ペイン結合（別ウィンドウのペインを現在のウィンドウに結合）
bind @ command-prompt -p "join pane from:" "join-pane -s '%%'"

# セッション/ウィンドウ選択ツリー（デフォルトの s は横分割に上書き済み）
bind f choose-tree -Zs

# 新しいウィンドウ（カレントディレクトリ引き継ぎ）
bind c new-window -c "#{pane_current_path}"

# セッション管理
bind S command-prompt -p "New Session:" "new-session -s '%%'"
bind X confirm-before -p "kill-session #S? (y/n)" "kill-session"

# レイアウト
bind M-space select-layout even-horizontal
bind M-1 select-layout even-vertical
bind M-2 select-layout main-horizontal
bind M-3 select-layout main-vertical
bind M-4 select-layout tiled

# ---------------------------------------------------------------------------
# Claude Code worktree
# ---------------------------------------------------------------------------

# worktree内でも元リポジトリルートを解決してから起動
# git管理外ならカレントディレクトリをそのまま使用

# ランダム名で即起動
bind C run-shell 'dir=$(git -C "#{pane_current_path}" worktree list --porcelain 2>/dev/null | head -1 | sed "s/^worktree //"); dir="${dir:-#{pane_current_path}}"; n=$(LC_ALL=C tr -dc a-z0-9 </dev/urandom | head -c 6); tmux new-window -n "cc:$n" -c "$dir" "claude --worktree $n; exec $SHELL"'

# 名前を入力して起動
bind M-c command-prompt -p "Worktree name:" "run-shell 'dir=$(git -C \"#{pane_current_path}\" worktree list --porcelain 2>/dev/null | head -1 | sed \"s/^worktree //\"); dir=\"${dir:-#{pane_current_path}}\"; tmux new-window -n \"cc:%%\" -c \"$dir\" \"claude --worktree %%; exec $SHELL\"'"

# ---------------------------------------------------------------------------
# コピーモード
# ---------------------------------------------------------------------------

bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# クリップボード連携（環境別）
# WSL2: uname -r にカーネル文字列 "microsoft" が含まれるかで判定（環境変数に依存しない）
# macOS/Linux: else 分岐で排他的に設定し、後続の if-shell で上書きされる問題を回避
if-shell 'uname -r | grep -qi microsoft' \
  "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'win32yank.exe -i'; \
   bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'win32yank.exe -i'" \
  "if-shell 'test \"$(uname)\" = \"Darwin\"' \
    'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel pbcopy; \
     bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel pbcopy' \
    'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel \"xsel --clipboard --input\"; \
     bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel \"xsel --clipboard --input\"'"

# ---------------------------------------------------------------------------
# 通知設定
# ---------------------------------------------------------------------------

set -g visual-activity on
set -g visual-bell on
set -g visual-silence on
set -g bell-action any

# ---------------------------------------------------------------------------
# ペインボーダー（catppuccin が上書きしない場合のフォールバック）
# ---------------------------------------------------------------------------

set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour39

# ---------------------------------------------------------------------------
# ウィンドウ名管理スクリプト連携
# ---------------------------------------------------------------------------

set -g @window_manager_script "$HOME/.scripts/tmux_window_manager.sh"

bind M-s run-shell '#{@window_manager_script} smart'
bind M-g run-shell '#{@window_manager_script} git'
bind M-t run-shell '#{@window_manager_script} time'
bind M-p run-shell '#{@window_manager_script} project'
bind M-r command-prompt -p "Rename window:" "run-shell '#{@window_manager_script} custom \"%%\"'"
bind M-w run-shell '#{@window_manager_script} show'
bind M-0 run-shell 'tmux rename-window "$(basename "$(pwd)")"'

# ---------------------------------------------------------------------------
# TPM 初期化（最下部に配置すること）
# TPM 未インストールの場合: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# プラグインインストール: prefix + I
# ---------------------------------------------------------------------------

if "test ! -d ~/.tmux/plugins/tpm" \
  "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/tpm'"
run '~/.tmux/plugins/tpm/tpm'
